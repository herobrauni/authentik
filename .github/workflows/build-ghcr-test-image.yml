---
name: Build GHCR test image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GHCR tag prefix
        required: false
        default: account-switcher

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image tags
        id: image
        env:
          TAG_PREFIX: ${{ inputs.tag }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/authentik"
          sha_short="${GITHUB_SHA::7}"
          tag_prefix="${TAG_PREFIX:-account-switcher}"
          {
            echo "name=${image}"
            echo "version=${tag_prefix}-${sha_short}"
            echo "tags=${image}:${tag_prefix}-${sha_short},${image}:${tag_prefix}"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: lifecycle/container/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_BUILD_HASH=${{ github.sha }}
            VERSION=${{ steps.image.outputs.version }}
          secrets: |
            GEOIPUPDATE_ACCOUNT_ID=${{ secrets.GEOIPUPDATE_ACCOUNT_ID }}
            GEOIPUPDATE_LICENSE_KEY=${{ secrets.GEOIPUPDATE_LICENSE_KEY }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
